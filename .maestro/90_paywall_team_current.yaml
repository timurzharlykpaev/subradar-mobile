appId: com.goalin.subradar
name: "90 - Paywall: Team owner sees Team as CURRENT (v1.4.0)"
#
# Logs in as `qa-team-owner@subradar.test`, opens paywall, verifies the Team
# plan card carries the `-current` suffix. Pro card should NOT be marked
# current (even though team entitles Pro access, the plan they're on is Team).
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "qa-team-owner@subradar.test"
- tapOn:
    id: "btn-send-code"

- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    id: "btn-notifications-skip"
    optional: true
- tapOn:
    id: "btn-first-sub-skip"
    optional: true
- tapOn:
    id: "welcome-skip"
    optional: true
- extendedWaitUntil:
    notVisible:
      id: "welcome-sheet"
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- assertVisible: "TEAM"

- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Upgrade"
    optional: true
- tapOn:
    text: "Plan"
    optional: true
- tapOn:
    text: "Subscription"
    optional: true

- extendedWaitUntil:
    visible:
      id: "paywall-screen"
    timeout: 15000

# Team (id 'org') must carry -current suffix
- assertVisible:
    id: "plan-card-org-current"

- takeScreenshot: 90_paywall_team_current

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
