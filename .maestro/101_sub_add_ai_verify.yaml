appId: com.goalin.subradar
name: "101 - Add via AI smart-input → verify in list (HARD, network-dependent)"
#
# Drives the AI text path: type a natural-language line into smart-input,
# wait for the InlineConfirmCard to render the parsed name, tap its
# "Add Subscription" CTA, then verify the row lands in the list.
#
# FRAGILITY: this exercises the live /ai/lookup backend. The AI call can be
# slow or flaky, so the confirm-card wait is generous (25s). If the parse
# fails the InlineConfirmCard never appears; the manual fallback block below
# guarantees a row still gets created so the list assertion stays HARD and
# the suite doesn't go green on a no-op. The final list assert checks for
# EITHER the AI name or the fallback name.
#
# GROUNDING:
#  - smart-input             → add-subscription/IdleView.tsx:447
#  - "Add Subscription" CTA  → InlineConfirmCard.tsx:621 (add_flow.add_subscription, en.json)
#  - hero-manual / name-input/amount-input/btn-save-sub → fallback path (ManualFormView)
#  - subscription-list / subscriptions-screen → (tabs)/subscriptions.tsx:583,337
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 20000

- tapOn:
    id: "tab-add"
- extendedWaitUntil:
    visible:
      id: "add-sub-sheet"
    timeout: 10000

# AI smart input → parse
- tapOn:
    id: "smart-input"
- inputText: "Spotify 9.99 monthly"
- hideKeyboard
# Trigger the AI lookup explicitly via the "Add with AI" CTA if present
# (the field also submits on keyboard return, but the button is the stable
# affordance once text is entered).
- tapOn:
    text: "Add with AI"
    optional: true

# Wait for the InlineConfirmCard to show the parsed service name.
- extendedWaitUntil:
    visible:
      text: "Spotify"
    timeout: 25000
    optional: true

- takeScreenshot: 101_ai_parsed

# If the confirm card rendered its save CTA, commit the AI subscription.
- tapOn:
    text: "Add Subscription"
    optional: true

# Fallback: if AI failed (the manual form trigger is still reachable because
# the sheet is still on IdleView), create a row manually so the list
# assertion below still proves the create pipeline end-to-end. The whole
# block is gated on the add sheet still being visible — if the AI save
# already closed it, none of these steps run.
- runFlow:
    when:
      visible:
        id: "hero-manual"
    commands:
      - tapOn:
          id: "hero-manual"
      - extendedWaitUntil:
          visible:
            id: "name-input"
          timeout: 10000
      - tapOn:
          id: "name-input"
      - inputText: "QA AI Fallback"
      - tapOn:
          id: "amount-input"
      - inputText: "9.99"
      - tapOn:
          point: "88%,62%"
      - tapOn:
          id: "btn-save-sub"

# Either path closes the sheet
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 20000

- runFlow: ./_dismiss_modals.yaml

- tapOn:
    id: "tab-subs"
- extendedWaitUntil:
    visible:
      id: "subscriptions-screen"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "subscription-list"
    timeout: 10000

# HARD: at least one of the two possible names is in the list. assertVisible
# without `optional` — the run fails if NEITHER row materialised, so a broken
# create pipeline can't pass silently.
- assertVisible:
    text: "Spotify|QA AI Fallback"

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
- assertNotVisible: "Could not parse"
