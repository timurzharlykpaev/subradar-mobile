appId: com.goalin.subradar
name: "40 - Paywall: Plan Cards Display Correctly"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to paywall
- tapOn: "Settings"
- scroll
- assertVisible:
    text: "Plan"
    optional: true- tapOn:
    text: "Plan"
    optional: true

# Should see plan options
- assertVisible:
    text: "Free"
    optional: true
- assertVisible:
    text: "Pro"
    optional: true

# Check no NaN in prices
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"

# Check billing toggle
- tapOn:
    text: "Yearly"
    optional: true

# Check -30% badge
- assertVisible:
    text: "30%"
    optional: true

# Switch back to monthly
- tapOn:
    text: "Monthly"
    optional: true

# Close
- pressKey: back
