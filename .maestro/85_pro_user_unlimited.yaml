appId: com.goalin.subradar
name: "85 - Pro user: no Free limit on subscription add (v1.4.0)"
#
# Logs in as `qa-pro-active@subradar.test` (Pro seeded, 8 subs already).
# Confirms the Free 3-sub modal does NOT appear on the 4th add — Pro has
# unlimited subs. Catches regression where useEffectiveAccess.limits drifts.
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "qa-pro-active@subradar.test"
- tapOn:
    id: "btn-send-code"

- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    id: "btn-notifications-skip"
    optional: true
- tapOn:
    id: "btn-first-sub-skip"
    optional: true
- tapOn:
    id: "welcome-skip"
    optional: true

- extendedWaitUntil:
    notVisible:
      id: "welcome-sheet"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

# Pro seed has 8 subs — open Add sheet, add a 9th
- tapOn:
    id: "tab-add"
- extendedWaitUntil:
    visible:
      id: "add-sub-sheet"
    timeout: 10000
- tapOn:
    id: "btn-manual-toggle"
- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 10000
- tapOn:
    id: "name-input"
- inputText: "QA Pro 9th"
- tapOn:
    id: "amount-input"
- inputText: "5.99"
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard
- tapOn:
    id: "btn-save-sub"

# Sheet closes (no Free limit modal since Pro)
- extendedWaitUntil:
    notVisible:
      id: "add-sub-sheet"
    timeout: 15000

- assertNotVisible: "Upgrade to Pro"
- assertNotVisible: "Лимит"
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
