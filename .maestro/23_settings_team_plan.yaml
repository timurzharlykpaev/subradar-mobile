appId: com.goalin.subradar
name: "23 - Settings: Team Plan, Pull-to-Refresh, Edit Profile"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Settings tab
- tapOn:
    text: "Settings"
    optional: true
- assertVisible:
    id: "settings-screen"
    optional: true
- takeScreenshot: 23_settings_screen

# Verify plan card is displayed (Pro / Team / SubRadar)
- assertVisible:
    id: "btn-plan-card"
    optional: true
- takeScreenshot: 23_plan_card

# Pull-to-refresh on settings scroll
- swipe:
    id: "settings-scroll"
    direction: "DOWN"
    duration: 1500
- takeScreenshot: 23_after_refresh

# Verify pencil icon (edit profile button) exists
- assertVisible:
    id: "btn-edit-profile"
    optional: true
- takeScreenshot: 23_edit_profile_btn

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
