appId: com.goalin.subradar
name: "87 - AI add via smart text input (v1.4.0)"
#
# Types a natural-language line into the AI smart input, waits for the
# InlineConfirmCard, saves. Verifies AI parse → subscription flow.
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- tapOn:
    id: "tab-add"
- extendedWaitUntil:
    visible:
      id: "add-sub-sheet"
    timeout: 10000

# Smart input → AI parse
- tapOn:
    id: "smart-input"
- inputText: "Netflix 15.99 monthly"
- hideKeyboard

# AI call can take 5-10s; wait for confirm card or fallback
- extendedWaitUntil:
    visible:
      text: "Netflix"
    timeout: 20000
    optional: true

- takeScreenshot: 87_ai_parsed

# No hard save — backend AI might be flaky; we just verify no error
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
- assertNotVisible: "Could not parse"
