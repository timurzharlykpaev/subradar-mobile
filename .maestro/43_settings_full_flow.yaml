appId: com.goalin.subradar
name: "43 - Settings: Complete Walkthrough"
---
- runFlow: ./00_setup_auth.yaml

# Go to settings
- tapOn: "Settings"
- assertVisible: "Settings"

# Profile section visible
- assertVisible:
    text: "@"
    optional: true

# Theme toggle
- tapOn:
    id: "btn-theme-toggle"
    optional: true
# Toggle back
- tapOn:
    id: "btn-theme-toggle"
    optional: true

# Currency selection
- scroll
- assertVisible:
    text: "USD"
    optional: true- tapOn:
    text: "EUR"
    optional: true
- tapOn:
    text: "USD"
    optional: true

# Language selection
- scroll
- assertVisible:
    text: "English"
    optional: true- assertVisible:
    text: "English"
    optional: true

# Notifications section
- scroll
- assertVisible:
    text: "Notification"
    optional: true# Reminder days
- tapOn:
    text: "3d"
    optional: true
- tapOn:
    id: "btn-reminder-3d"
    optional: true

# Scroll to bottom
- scroll
- assertVisible:
    text: "Sign Out"
    optional: true# Check Sign Out exists
- assertVisible:
    text: "Sign Out"
