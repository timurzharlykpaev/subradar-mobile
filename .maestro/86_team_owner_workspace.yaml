appId: com.goalin.subradar
name: "86 - Team owner: workspace tab + plan badge (v1.4.0)"
#
# Logs in as `qa-team-owner@subradar.test`. Verifies:
# - Dashboard shows TEAM plan badge
# - Workspace tab renders without empty-state CTA
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "qa-team-owner@subradar.test"
- tapOn:
    id: "btn-send-code"

- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    id: "btn-notifications-skip"
    optional: true
- tapOn:
    id: "btn-first-sub-skip"
    optional: true
- tapOn:
    id: "welcome-skip"
    optional: true

- extendedWaitUntil:
    notVisible:
      id: "welcome-sheet"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

# Dashboard should show TEAM badge — locale-independent check via badge text
- assertVisible: "TEAM"

# Workspace tab
- tapOn:
    id: "tab-workspace"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 86_workspace_view

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
