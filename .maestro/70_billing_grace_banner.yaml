appId: com.goalin.subradar
name: "70 - Billing: GraceBanner renders for grace_pro user"
#
# HARD-ASSERT GraceBanner for the seeded grace_pro account. Previously this
# flow logged in as review@subradar.ai (a fresh FREE review user) and only
# screenshotted the dashboard — it never surfaced a grace banner, so it was a
# false positive. Now it logs in as the real seeded grace user and asserts the
# grace-banner testID + tap-through to the paywall.
#
# Grounded: banner-priority.ts L99-110 (state=grace_pro + gracePeriodEnd),
# seed-test-users.ts L167-176 (qa-pro-grace, gracePeriodEnd +4d).
# GraceBanner.tsx testID="grace-banner", onPress → router.push('/paywall').
---
- runFlow:
    file: ./_login_as.yaml
    env:
      EMAIL: "qa-pro-grace@subradar.test"

- extendedWaitUntil:
    visible:
      id: "grace-banner"
    timeout: 15000
- takeScreenshot: 70_grace_banner

- tapOn:
    id: "grace-banner"
- extendedWaitUntil:
    visible:
      id: "paywall-screen"
    timeout: 12000

- assertNotVisible: "Render Error"
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
