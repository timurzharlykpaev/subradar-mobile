appId: com.goalin.subradar
name: "16 - Settings Language"
---

- runFlow: ./00_setup_auth.yaml

- tapOn:
    text: "Settings, tab"
    optional: true
- tapOn:
    text: "Settings"
    optional: true
- assertNotVisible: "undefined"

# Сбрасываем язык обратно на English чтобы не ломать последующие flows
- tapOn:
    text: "Language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd
