appId: com.goalin.subradar
name: "06 - Analytics Screen"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Analytics tab
- tapOn:
    text: "Analytics"
    optional: true

# Verify analytics screen loaded
- assertVisible:
    id: "analytics-screen"
    optional: true
- takeScreenshot: 06_analytics_screen

# Verify stats row is visible
- assertVisible:
    id: "analytics-stats-row"
    optional: true

# Verify monthly chart
- assertVisible:
    id: "analytics-monthly-chart"
    optional: true
- takeScreenshot: 06_analytics_charts

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
