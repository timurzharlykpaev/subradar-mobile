appId: com.goalin.subradar
name: "20 - Dashboard Sanity Check"
---
- runFlow: ./00_setup_auth.yaml

# Verify Dashboard loaded
- assertVisible:
    id: "dashboard-screen"
    optional: true
- takeScreenshot: 20s_dashboard_loaded

# Verify hero card
- assertVisible:
    id: "dashboard-hero-card"
    optional: true

# Verify stats row
- assertVisible:
    id: "dashboard-stats-row"
    optional: true

# Scroll to forecast
- scrollUntilVisible:
    element:
      id: "dashboard-forecast-row"
    direction: DOWN
    timeout: 5000
    optional: true
- takeScreenshot: 20s_forecast_section

# Verify forecast row
- assertVisible:
    id: "dashboard-forecast-row"
    optional: true

# Verify upcoming list
- assertVisible:
    id: "dashboard-upcoming-list"
    optional: true
- takeScreenshot: 20s_upcoming_list

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"
