appId: com.goalin.subradar
name: "Dashboard - No NaN/undefined/Ошибка, has Прогноз"
---

# Авторизация через demo аккаунт
- runFlow: ./00_setup_auth.yaml

- tapOn:
    text: "Главная"
    optional: true
- assertVisible:
    text: "Главная"
    optional: true
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "null"
- assertNotVisible: "Ошибка"
- assertNotVisible: "Error"
# Check forecast element exists on dashboard
- assertVisible:
    text: "Прогноз"
    optional: true
- assertVisible:
    text: "₸"
    optional: true
- assertVisible:
    text: "$"
    optional: true
