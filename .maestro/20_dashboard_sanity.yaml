appId: com.goalin.subradar
name: "Dashboard - No NaN/undefined/Ошибка, has Прогноз"
---

# Авторизация через demo аккаунт
- runFlow: ./00_setup_auth.yaml

# Переходим на Home (язык может быть любым — тапаем по индексу таба)
- tapOn:
    text: "Home, tab"
    optional: true
- tapOn:
    text: "Home"
    optional: true

# Нет битых значений
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "null"
- assertNotVisible: "Error"

# Forecast блок есть (ключевые слова на любом языке)
- assertVisible:
    text: "Forecast"
    optional: true
- assertVisible:
    text: "USD"
    optional: true
