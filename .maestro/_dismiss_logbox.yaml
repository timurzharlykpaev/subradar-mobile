appId: com.goalin.subradar
name: "shared - dismiss RN LogBox overlays"
#
# Taps any visible LogBox-style dev overlay (Console Error / Console Warning
# from React Native). All optional — safe to include between any two Maestro
# steps on a debug build.
#
# Three phases:
#   1. Full-screen error overlay → "Dismiss" button
#   2. Minimized warning banner → tap the "x" close icon at bottom-right
#   3. If banner still visible, swipe it away
---
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
# Minimized banner — "x" is at bottom-right. Use point tap so we don't rely
# on a platform-specific accessibility label.
- tapOn:
    point: "92%,93%"
    optional: true
