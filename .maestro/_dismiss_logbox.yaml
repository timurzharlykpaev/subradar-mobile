appId: com.goalin.subradar
name: "shared - dismiss RN LogBox overlays"
#
# In E2E builds LogBox is globally muted (see app/_layout.tsx with
# EXPO_PUBLIC_E2E_MODE=1). This helper stays as a safety net for legacy
# builds or edge cases where a modal leaks through. We only tap text-based
# Dismiss / Minimize buttons — no point taps (they used to hit btn-next
# hidden at the same viewport coordinates, skipping steps).
---
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "Minimize"
    optional: true
