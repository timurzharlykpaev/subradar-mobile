appId: com.goalin.subradar
name: "01 - Onboarding Language Selection (v1.4.0)"
---
# Clean start
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000

# Step 0: Money hook showcase
- assertVisible: "SubRadar"
- takeScreenshot: 01_feature_showcase
- tapOn:
    id: "btn-get-started"

# Step 1: Language selection
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- takeScreenshot: 01_language_select
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

# v1.4.0 has NO step-welcome; next step is step-currency
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- takeScreenshot: 01_after_language

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
