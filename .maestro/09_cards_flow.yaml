appId: com.goalin.subradar
name: "09 - Cards Flow"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Settings tab
- tapOn:
    text: "Settings"
    optional: true

# Verify settings screen loaded
- assertVisible:
    id: "settings-screen"
    optional: true
- takeScreenshot: 09_settings_screen

# Scroll to Payment Cards section
- scroll
- assertVisible:
    text: "btn-add-card"
    optional: true

# Tap Add Card
- tapOn:
    id: "btn-add-card"
    optional: true
- takeScreenshot: 09_add_card_form

# Fill card nickname
- tapOn:
    id: "input-card-nickname"
    optional: true
- inputText: "My Visa"

# Fill last 4 digits
- tapOn:
    id: "input-card-last4"
    optional: true
- inputText: "4242"
- takeScreenshot: 09_card_form_filled

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
