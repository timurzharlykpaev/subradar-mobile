appId: com.goalin.subradar
name: "15 - Settings Currency"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Settings tab
- tapOn:
    text: "Settings"
    optional: true

# Verify settings screen loaded
- assertVisible:
    id: "settings-screen"
    optional: true
- takeScreenshot: 15_settings_screen

# Verify currency buttons are present
- assertVisible:
    id: "btn-currency-USD"
    optional: true
- takeScreenshot: 15_currency_section

# Tap EUR to test currency switching
- tapOn:
    id: "btn-currency-EUR"
    optional: true
- takeScreenshot: 15_currency_eur

# Switch back to USD
- tapOn:
    id: "btn-currency-USD"
    optional: true
- takeScreenshot: 15_currency_usd_restored

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"
