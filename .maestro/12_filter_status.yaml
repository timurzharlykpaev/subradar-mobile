appId: com.goalin.subradar
name: "12 - Filter Subscriptions by Status"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Subscriptions tab
- tapOn:
    text: "Subs"
    optional: true

# Verify subscriptions screen loaded
- assertVisible:
    id: "subscriptions-screen"
    optional: true
- takeScreenshot: 12_subscriptions_loaded

# Filter: Active
- tapOn:
    id: "filter-chip-active"
    optional: true
- takeScreenshot: 12_filter_active
- assertNotVisible: "undefined"
- assertNotVisible: "Render Error"

# Filter: Trial
- tapOn:
    id: "filter-chip-trial"
    optional: true
- takeScreenshot: 12_filter_trial
- assertNotVisible: "undefined"
- assertNotVisible: "Render Error"

# Filter: Cancelled
- tapOn:
    id: "filter-chip-cancelled"
    optional: true
- takeScreenshot: 12_filter_cancelled
- assertNotVisible: "undefined"
- assertNotVisible: "Render Error"

# Filter: All
- tapOn:
    id: "filter-chip-all"
    optional: true
- takeScreenshot: 12_filter_all

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
