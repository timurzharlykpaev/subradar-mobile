appId: com.goalin.subradar
name: "Filter Subscriptions by Status"
---

# Авторизация через demo аккаунт
- runFlow: ./00_setup_auth.yaml

- tapOn:
    text: "Подписки"
- assertVisible: "Подписки"
# Filter: Active
- tapOn:
    text: "Активные"
    optional: true
- assertNotVisible: "undefined"
- assertNotVisible: "Ошибка"
# Filter: Trial
- tapOn:
    text: "Триал"
    optional: true
- assertNotVisible: "undefined"
- assertNotVisible: "Ошибка"
# Filter: All
- tapOn:
    text: "Все"
    optional: true
- assertNotVisible: "undefined"
