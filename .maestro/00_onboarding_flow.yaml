appId: com.goalin.subradar
name: "00 - Onboarding + Auth flow (v1.4.0, 6 slides)"
---
# Clean start
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000

- runFlow: ./_dismiss_logbox.yaml

# Step 0: Money hook + Quick-add showcase
- tapOn:
    id: "btn-get-started"

# Step 1: Language
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 5000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml

# Step 2: Currency (step-welcome + step-features merged out in v1.4.0)
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 5000
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml

# Step 3: Auth
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 5000
- tapOn:
    id: "btn-email"

# Email input
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: "review@subradar.ai"
- tapOn:
    id: "btn-send-code"

# OTP — the review account accepts bypass code 000000.
# Tap each field separately because the OTP input auto-advances focus
# per keystroke and bulk inputText can drop tail digits on the simulator.
- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"

# Verify
- extendedWaitUntil:
    visible:
      id: "btn-verify"
    timeout: 5000
- tapOn:
    id: "btn-verify"

# Wait for auth to complete
- extendedWaitUntil:
    notVisible:
      id: "btn-verify"
    timeout: 15000

# Step 4: Notifications permission (native iOS system dialog may also appear)
- tapOn:
    text: "Maybe later"
    optional: true
- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    text: "Allow"
    optional: true

# Step 5: First-sub showcase
- tapOn:
    text: "Skip for now"
    optional: true
- tapOn:
    text: "Пропустить"
    optional: true

# Handle any lingering modals (TrialOffer, WelcomeSheet)
- tapOn:
    text: "Maybe Later"
    optional: true
- tapOn:
    text: "Skip"
    optional: true

# Close Expo dev debugger banner if present
- tapOn:
    point: "95%,98%"
    optional: true

# Wait for dashboard content
- extendedWaitUntil:
    visible: "Total this month"
    timeout: 20000
    optional: true
