appId: com.goalin.subradar
name: "00 - Onboarding + Auth flow"
---
# Clean start
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000

# Step 0: Showcase
- tapOn:
    id: "btn-get-started"

# Step 1: Language
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 5000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

# Step 2: Welcome
- extendedWaitUntil:
    visible:
      id: "step-welcome"
    timeout: 5000
- tapOn:
    id: "btn-next"

# Step 3: Features
- extendedWaitUntil:
    visible:
      id: "step-features"
    timeout: 5000
- tapOn:
    id: "btn-next"

# Step 4: Currency
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 5000
- tapOn:
    id: "btn-next"

# Step 5: Auth
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 5000
- tapOn:
    id: "btn-email"

# Email input
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 5000
- tapOn:
    id: "email-input"
- inputText: "demo@subradar.ai"
- tapOn:
    id: "btn-send-code"

# OTP — enter digits one by one
- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "1"
- inputText: "2"
- inputText: "3"
- inputText: "4"
- inputText: "5"
- inputText: "6"

# Verify
- extendedWaitUntil:
    visible:
      id: "btn-verify"
    timeout: 5000
- tapOn:
    id: "btn-verify"

# Wait for auth to complete — Step 6: "Add first subscription"
- extendedWaitUntil:
    notVisible:
      id: "btn-verify"
    timeout: 15000

# Handle notification permission screen
- tapOn:
    text: "Maybe later"
    optional: true
- tapOn:
    text: "Skip for now"
    optional: true

# Handle WelcomeSheet / TrialOffer
- tapOn:
    text: "Skip for now"
    optional: true
- tapOn:
    text: "Maybe Later"
    optional: true

# Close Expo dev debugger banner if present
- tapOn:
    point: "95%,98%"
    optional: true

# Wait for dashboard content
- extendedWaitUntil:
    visible: "Total this month"
    timeout: 20000
    optional: true
