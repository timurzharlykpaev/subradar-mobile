appId: com.goalin.subradar
name: "00 - Onboarding + Auth (v1.4.0, 6 slides)"
#
# HARD asserts each step. Runner full-erases the sim before each flow,
# so we always start at step 0 (money hook).
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml

# Step 0: money hook
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

# Step 1: value preview (replaced language picker)
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-value-preview"
    timeout: 10000
- tapOn:
    id: "btn-value-preview-continue"

# Step 2: currency
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 3000
- tapOn:
    id: "btn-next"

# Step 3: auth
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "review@subradar.ai"
- tapOn:
    id: "btn-send-code"

# OTP — per-field
- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

# iOS native permission dialog — truly conditional
- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    text: "Allow"
    optional: true

# Step 4: notifications — testID-based skip
- tapOn:
    id: "btn-notifications-skip"
    optional: true

# Step 5: first-sub — testID-based skip
- tapOn:
    id: "btn-first-sub-skip"
    optional: true

# Dismiss any post-onboarding modal
- runFlow: ./_dismiss_modals.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
