appId: com.goalin.subradar
name: "00 - Onboarding + Auth (v1.4.0, 6 slides, restart-safe)"
#
# Robust against partial state (isOnboarded=true from a prior run). When
# the app is already past the money-hook step, we skip ahead. The only
# hard gate is reaching step-auth and logging in via review bypass.
---
- clearState
- launchApp

# Dismiss any LogBox overlay
- runFlow: ./_dismiss_logbox.yaml

# Either step 0 (fresh install) OR step 3 (returning-but-logged-out).
# Both paths land on step-auth eventually.
- tapOn:
    id: "btn-get-started"
    optional: true

- runFlow: ./_dismiss_logbox.yaml

# Step 1: Language — only visible on fresh install
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"
    optional: true

- runFlow: ./_dismiss_logbox.yaml

# Step 2: Currency — same, optional tap
- tapOn:
    id: "btn-next"
    optional: true

- runFlow: ./_dismiss_logbox.yaml

# Step 3: Auth — HARD gate
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "review@subradar.ai"
- tapOn:
    id: "btn-send-code"

# OTP — per-field (bulk inputText drops tail digits on simulator)
- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

# iOS native permission dialog — truly conditional
- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    text: "Allow"
    optional: true

# Step 4: Notifications — testID-based skip (only shown if step-by-step)
- tapOn:
    id: "btn-notifications-skip"
    optional: true

# Step 5: First-sub — testID-based skip
- tapOn:
    id: "btn-first-sub-skip"
    optional: true

# Dismiss WelcomeSheet modal if it appears
- tapOn:
    id: "welcome-skip"
    optional: true

# Ensure the Modal is actually gone — waitForAnimationToEnd misses RN Modal
# transitions, so we wait for the testID to disappear from the hierarchy.
- extendedWaitUntil:
    notVisible:
      id: "welcome-sheet"
    timeout: 5000

# Dismiss TrialOfferModal if it appears (Free user after first sub)
- tapOn:
    text: "Maybe Later"
    optional: true
- tapOn:
    text: "Skip"
    optional: true

# Final gate: Dashboard must render
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
