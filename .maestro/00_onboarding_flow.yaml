appId: com.goalin.subradar
name: "00 - Onboarding + Auth (v1.4.0, 6 slides)"
#
# HARD asserts each step. Runner full-erases the sim before each flow,
# so we always start at step 0 (money hook).
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml

# Step 0: money hook
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

# Step 1: value preview (replaced language picker)
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-value-preview"
    timeout: 10000
# Language is forced to English in E2E builds via getDeviceLanguage (gated on
# EXPO_PUBLIC_E2E_MODE), so no in-app language selection is needed here.
- tapOn:
    id: "btn-value-preview-continue"

# Step 2: currency — AUTO-SKIPPED when the timezone unambiguously determines
# the region (onboarding.tsx gotoStep:625, `regionAutoDetected`). On most sims
# the step is skipped and we land straight on auth, so only tap Next if the
# currency step actually rendered.
- runFlow: ./_dismiss_logbox.yaml
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible:
        id: "step-currency"
    commands:
      - tapOn:
          id: "btn-next"

# Step 3: auth
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "review@subradar.ai"
# Dismiss the keyboard — it covers btn-send-code, so a tap without this lands
# on the keyboard instead of the button and the OTP screen never appears.
- hideKeyboard
- tapOn:
    id: "btn-send-code"

# OTP — per-field
- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
# The number-pad keyboard has no dismiss key (hideKeyboard fails on it), and it
# can cover btn-verify. Tap the displayed email (static text) to drop focus.
- tapOn:
    text: "review@subradar.ai"
    optional: true
- tapOn:
    id: "btn-verify"

# iOS native permission dialog — truly conditional
- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    text: "Allow"
    optional: true

# Step 4: notifications — testID-based skip
- tapOn:
    id: "btn-notifications-skip"
    optional: true

# Step 5: first-sub — testID-based skip
- tapOn:
    id: "btn-first-sub-skip"
    optional: true

# Dismiss any post-onboarding modal
- runFlow: ./_dismiss_modals.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
