appId: com.goalin.subradar
name: "29 - Bulk Add via Text"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Subscriptions tab
- tapOn:
    text: "Subs"
    optional: true

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Switch to AI tab
- tapOn:
    id: "tab-ai"
    optional: true
- takeScreenshot: 29_ai_tab

# Look for Quick Import / Bulk button
- scroll
- assertVisible:
    text: "Quick Import"
    optional: true

- tapOn:
    text: "Quick Import"
    optional: true
- takeScreenshot: 29_quick_import

# Select text mode
- tapOn:
    text: "Text"
    optional: true
- takeScreenshot: 29_text_mode

# Enter multiple subscriptions
- inputText: "Netflix $15.99/mo, Spotify $9.99/mo, ChatGPT Plus $20/mo"
- takeScreenshot: 29_text_entered

# Parse
- tapOn:
    text: "Recognize"
    optional: true
- tapOn:
    text: "Parse"
    optional: true

# Wait for results
- extendedWaitUntil:
    visible:
      text: "Netflix"
    timeout: 15000
  optional: true
- takeScreenshot: 29_parsed_results

# Should show found subscriptions
- assertVisible:
    text: "Netflix"
    optional: true
- assertVisible:
    text: "Spotify"
    optional: true

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
