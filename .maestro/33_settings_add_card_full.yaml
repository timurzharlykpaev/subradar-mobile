appId: com.goalin.subradar
name: "33 - Settings: Full Add Card Flow with Validation"
---
- runFlow: ./00_setup_auth.yaml

# Go to settings
- tapOn: "Settings"

# Scroll to add card button
- scrollUntilVisible:
    element:
      text: "Add Card"
    direction: DOWN
    timeout: 5000

- tapOn:
    text: "Add Card"

# Fill card form
- tapOn:
    id: "input-card-nickname"
    optional: true
- inputText: "Test Visa Card"

- tapOn:
    id: "input-card-last4"
    optional: true
- inputText: "4242"

# Select VISA brand
- tapOn:
    text: "VISA"
    optional: true

# Save card
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    id: "btn-save-card"
    optional: true

# Verify card appears in list
- assertVisible:
    text: "4242"
    optional: true

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
