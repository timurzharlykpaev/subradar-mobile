appId: com.goalin.subradar
name: "89 - Paywall: Pro user sees Pro as CURRENT + Team upsell (v1.4.0)"
#
# Logs in as `qa-pro-active@subradar.test`, navigates Settings → Upgrade,
# verifies the Pro plan card carries the `-current` suffix (CURRENT badge)
# and the Team card is visible for upsell.
---
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000
- tapOn:
    id: "btn-get-started"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- tapOn:
    id: "btn-next"

- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 15000
- tapOn:
    id: "btn-email"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: "qa-pro-active@subradar.test"
- tapOn:
    id: "btn-send-code"

- extendedWaitUntil:
    visible:
      id: "otp-input-0"
    timeout: 15000
- tapOn:
    id: "otp-input-0"
- inputText: "0"
- tapOn:
    id: "otp-input-1"
- inputText: "0"
- tapOn:
    id: "otp-input-2"
- inputText: "0"
- tapOn:
    id: "otp-input-3"
- inputText: "0"
- tapOn:
    id: "otp-input-4"
- inputText: "0"
- tapOn:
    id: "otp-input-5"
- inputText: "0"
- tapOn:
    id: "btn-verify"

- tapOn:
    text: "Don't Allow"
    optional: true
- tapOn:
    id: "btn-notifications-skip"
    optional: true
- tapOn:
    id: "btn-first-sub-skip"
    optional: true
- tapOn:
    id: "welcome-skip"
    optional: true
- extendedWaitUntil:
    notVisible:
      id: "welcome-sheet"
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

# Dashboard badge should read PRO
- assertVisible: "PRO"

# Open paywall via settings → Upgrade
- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Upgrade"
    optional: true
- tapOn:
    text: "Plan"
    optional: true
- tapOn:
    text: "Subscription"
    optional: true

- extendedWaitUntil:
    visible:
      id: "paywall-screen"
    timeout: 15000

# Pro card should have CURRENT suffix on testID
- assertVisible:
    id: "plan-card-pro-current"
- assertVisible:
    id: "plan-card-org"

- takeScreenshot: 89_paywall_pro_current

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
