appId: com.goalin.subradar
name: "45 - Pull to Refresh: All Screens (v1.4.0)"
#
# Uses `swipe` with absolute from/to — the old `scroll: direction: DOWN`
# syntax was removed in recent Maestro releases.
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible: "Total"
    timeout: 20000
    optional: true

# Dashboard pull-to-refresh
- swipe:
    start: "50%,25%"
    end: "50%,85%"

# Subscriptions tab
- tapOn:
    text: "Subs"
    optional: true
- tapOn:
    text: "Подписки"
    optional: true
- swipe:
    start: "50%,25%"
    end: "50%,85%"

# Analytics tab
- tapOn:
    text: "Analytics"
    optional: true
- tapOn:
    text: "Аналитика"
    optional: true
- swipe:
    start: "50%,25%"
    end: "50%,85%"

# No crashes
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "Render Error"
