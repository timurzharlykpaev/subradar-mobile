appId: com.goalin.subradar
name: "92 - Retention: billing banners (grace / billing-issue)"
#
# HARD-ASSERT the two banner priorities that the seed actually produces.
# Grounded against subradar-backend banner-priority.ts + seed-test-users.ts:
#
#   grace         ← state=grace_pro + gracePeriodEnd   → qa-pro-grace
#   billing_issue ← billingIssueAt set                 → qa-pro-billing-issue
#
# NOTE — expiration / double_pay / annual_upgrade / refund are intentionally
# NOT covered here. The current seed cannot produce them (verified against
# effective-access.service.ts + banner-priority.ts):
#   - expiration   needs cancel_at_period_end AND daysLeft<=7; seed
#     qa-pro-cancel-at-period-end has currentPeriodEnd +10d (>7) → `none`.
#   - double_pay   needs hasOwnPaidPlan && isTeamMember; qa-double-pay sets
#     neither billingSource nor a team membership → `none`.
#   - annual_upgrade / refund have no seeded account at all.
# Do NOT re-add waits for those banner testIDs against these accounts — they
# will always time out. See the section report for the seed-fix needed.
---
# 1) Grace period → grace banner, taps through to paywall
- runFlow:
    file: ./_login_as.yaml
    env:
      EMAIL: "qa-pro-grace@subradar.test"
- extendedWaitUntil:
    visible:
      id: "grace-banner"
    timeout: 15000
- takeScreenshot: 92_grace_banner
- tapOn:
    id: "grace-banner"
- extendedWaitUntil:
    visible:
      id: "paywall-screen"
    timeout: 12000
- assertNotVisible: "Render Error"
- assertNotVisible: "undefined"

# 2) Billing issue → billing-issue banner (highest priority)
- runFlow:
    file: ./_login_as.yaml
    env:
      EMAIL: "qa-pro-billing-issue@subradar.test"
- extendedWaitUntil:
    visible:
      id: "billing_issue-banner"
    timeout: 15000
- takeScreenshot: 92_billing_issue_banner
- assertNotVisible: "Render Error"
- assertNotVisible: "undefined"
