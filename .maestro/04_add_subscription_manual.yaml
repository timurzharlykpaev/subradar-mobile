appId: com.goalin.subradar
name: "04 - Add Subscription Manual (Progressive Disclosure)"
---
- runFlow: ./00_setup_auth.yaml

# Verify Dashboard loaded
- assertVisible:
    id: "dashboard-screen"
    optional: true
- takeScreenshot: 04_dashboard_loaded

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Switch to Manual tab
- tapOn:
    id: "tab-manual"
    optional: true
- takeScreenshot: 04_manual_tab_minimal

# Fill essential fields (Name + Amount)
- tapOn:
    id: "name-input"
    optional: true
- inputText: "Netflix"
- tapOn:
    id: "amount-input"
    optional: true
- inputText: "15.99"
- takeScreenshot: 04_essential_fields_filled

# Verify "More options" toggle exists
- assertVisible:
    text: "More options"
    optional: true
- assertVisible:
    text: "Ещё"
    optional: true

# Tap "More options" to expand
- tapOn:
    text: "More options"
    optional: true
- tapOn:
    text: "Ещё"
    optional: true
- scroll
- takeScreenshot: 04_more_options_expanded

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
