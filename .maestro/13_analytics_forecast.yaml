appId: com.goalin.subradar
name: "13 - Analytics Forecast"
---

- runFlow: ./00_setup_auth.yaml

# Открываем Analytics
- tapOn:
    text: "Analytics"
    optional: true

- waitForAnimationToEnd

# Проверяем что нет NaN/undefined
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "Error"

# Forecast секция должна быть видна
- assertVisible:
    text: "Forecast"
    optional: true
