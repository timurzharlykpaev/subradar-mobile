appId: com.goalin.subradar
name: "52 - AI Wizard: confirm step + edit details"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Should be on AI tab by default
- extendedWaitUntil:
    visible:
        id: "ai-wizard"
    timeout: 5000
- takeScreenshot: 52_ai_wizard_idle

# Type a service name
- tapOn:
    id: "ai-wizard-input"
- inputText: "Netflix"
- takeScreenshot: 52_input_filled

# Submit
- tapOn:
    text: "Далее →"
    optional: true
- tapOn:
    text: "Next →"
    optional: true

# Wait for AI response — should show confirm or plans
- extendedWaitUntil:
    notVisible:
        text: "Analyzing"
    timeout: 30000
    optional: true
- extendedWaitUntil:
    notVisible:
        text: "Анализирую"
    timeout: 30000
    optional: true
- takeScreenshot: 52_ai_response

# If plans screen — tap first plan
- tapOn:
    text: "Monthly"
    optional: true
- tapOn:
    text: "Помесячно"
    optional: true

# Confirm screen should appear
- takeScreenshot: 52_confirm_screen

# Tap "Edit details" to open manual form
- tapOn:
    text: "Edit details"
    optional: true
- tapOn:
    text: "Редактировать детали"
    optional: true
- takeScreenshot: 52_edit_details_manual_tab

# Verify manual form has prefilled data
- assertVisible:
    id: "name-input"
    optional: true
- assertVisible:
    id: "amount-input"
    optional: true

# Sanity
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
