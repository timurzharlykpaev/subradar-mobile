appId: com.goalin.subradar
name: "91 - Paywall: Free user purchase flow starts (v1.4.0)"
#
# Logs in as review@ (Free), opens paywall, taps Pro CTA. Verifies Apple
# StoreKit sheet opens (or confirmation in sandbox); we cancel rather than
# complete — simulator can't perform real IAP, but the CTA must reach
# the purchase state without a render error.
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

- tapOn:
    id: "tab-settings"
- waitForAnimationToEnd:
    timeout: 3000

# Various routes to paywall — at least one must be visible
- tapOn:
    text: "Upgrade to Pro"
    optional: true
- tapOn:
    text: "Upgrade"
    optional: true
- tapOn:
    text: "Plan"
    optional: true
- tapOn:
    text: "Subscription"
    optional: true

- extendedWaitUntil:
    visible:
      id: "paywall-screen"
    timeout: 15000

# Pro card should NOT have -current for Free user
- assertVisible:
    id: "plan-card-pro"
- assertVisible:
    id: "plan-card-org"
- assertVisible:
    id: "plan-card-free-current"

# Tap Pro card to select
- tapOn:
    id: "plan-card-pro"

# Take screenshot of ready-to-buy state
- takeScreenshot: 91_paywall_ready_to_buy

# We do NOT complete the purchase because simulator can't mint StoreKit
# receipts. The test passes if no render error + Pro is selectable.
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
- assertNotVisible: "Something went wrong"
