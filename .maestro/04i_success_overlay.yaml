appId: com.goalin.subradar
name: "04i - Success Overlay After Add"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Switch to Manual tab
- tapOn:
    id: "tab-manual"
    optional: true

# Fill required fields
- tapOn:
    id: "name-input"
    optional: true
- inputText: "Test Service"
- tapOn:
    id: "amount-input"
    optional: true
- inputText: "4.99"

# Save subscription
- tapOn:
    id: "btn-save-sub"
    optional: true
- takeScreenshot: 04i_success_overlay

# Wait for overlay to auto-dismiss
- extendedWaitUntil:
    notVisible: "Added!"
    timeout: 5000
    optional: true
- extendedWaitUntil:
    notVisible: "Добавлено!"
    timeout: 5000
    optional: true

# Should be back on dashboard/main screen
- takeScreenshot: 04i_after_success

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
