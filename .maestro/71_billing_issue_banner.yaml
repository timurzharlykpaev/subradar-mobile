appId: com.goalin.subradar
name: "71 - Billing: BillingIssueBanner highest priority"
#
# HARD-ASSERT BillingIssueBanner for the seeded billing_issue account.
# Previously this flow ran 00_onboarding_flow.yaml (a fresh FREE review user)
# and only screenshotted — it never surfaced the billing-issue banner, so it
# was a false positive. Now it logs in as the real seeded account and asserts
# the billing_issue-banner testID is present (it's the top-priority banner).
#
# Grounded: banner-priority.ts L90-97 (state=billing_issue OR billingIssueAt),
# seed-test-users.ts L178-189 (qa-pro-billing-issue, billingIssueAt -2d).
# BillingIssueBanner.tsx testID="billing_issue-banner".
#
# Note: the BillingIssueBanner CTA presents the RevenueCat Customer Center
# (native UI), not an in-app paywall route — so we assert presence only and
# do not assert a paywall-screen transition here.
---
- runFlow:
    file: ./_login_as.yaml
    env:
      EMAIL: "qa-pro-billing-issue@subradar.test"

- extendedWaitUntil:
    visible:
      id: "billing_issue-banner"
    timeout: 15000
- takeScreenshot: 71_billing_issue_state

# Only ONE banner renders at a time — the lower-priority annual_upgrade /
# win_back must NOT co-exist with billing_issue.
- assertNotVisible:
    id: "win_back-banner"
- assertNotVisible:
    id: "grace-banner"

- assertNotVisible: "Render Error"
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
