appId: com.goalin.subradar
name: "30 - Bulk Add via Voice (UI Verification)"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Look for Quick Import
- scroll
- assertVisible:
    text: "Quick Import"
    optional: true

- tapOn:
    text: "Quick Import"
    optional: true
- takeScreenshot: 30_quick_import

# Select voice mode
- tapOn:
    text: "Voice"
    optional: true
- takeScreenshot: 30_voice_mode

# Verify recording UI appears
- assertVisible:
    id: "voice-recorder"
    optional: true
- assertVisible:
    id: "btn-record"
    optional: true
- takeScreenshot: 30_voice_ui_visible

# Cancel
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "Close"
    optional: true

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
