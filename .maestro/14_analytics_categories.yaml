appId: com.goalin.subradar
name: "14 - Analytics Categories"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Analytics tab
- tapOn:
    text: "Analytics"
    optional: true

# Verify analytics screen loaded
- assertVisible:
    id: "analytics-screen"
    optional: true
- takeScreenshot: 14_analytics_screen

# Verify category chart
- assertVisible:
    id: "analytics-category-chart"
    optional: true
- takeScreenshot: 14_category_chart

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
