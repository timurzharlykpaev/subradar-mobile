appId: com.goalin.subradar
name: "11 - Search Subscription by Name"
---

- runFlow: ./00_setup_auth.yaml

# Открываем вкладку подписок
- tapOn:
    text: "Subscriptions"
    optional: true
- tapOn:
    text: "Subs"
    optional: true

- waitForAnimationToEnd

# Ищем подписку
- tapOn:
    id: "input-search"
    optional: true
- tapOn:
    text: "Search"
    optional: true

- inputText:
    text: "Netflix"

- waitForAnimationToEnd
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
