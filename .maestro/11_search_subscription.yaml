appId: com.goalin.subradar
name: "Search Subscription by Name"
---

# Авторизация через demo аккаунт
- runFlow: ./00_setup_auth.yaml

- tapOn:
    text: "Подписки"
- assertVisible: "Подписки"
- tapOn:
    id: "Search"
    optional: true
    optional: true
- tapOn:
    id: "input-search"
    optional: true
- inputText:
    text: "Netflix"
- assertVisible:
    text: "Netflix"
    timeout: 3000
    optional: true
- assertNotVisible: "Ошибка"
- assertNotVisible: "undefined"
