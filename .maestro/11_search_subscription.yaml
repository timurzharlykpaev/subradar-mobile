appId: com.goalin.subradar
name: "11 - Search Subscription by Name"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Subscriptions tab
- tapOn:
    text: "Subscriptions"
    optional: true

# Verify subscriptions screen loaded
- assertVisible:
    id: "subscriptions-screen"
    optional: true
- waitForAnimationToEnd

# Open search
- tapOn:
    id: "btn-toggle-search"
    optional: true

# Type search query
- tapOn:
    id: "search-input"
    optional: true
- inputText: "Netflix"
- waitForAnimationToEnd
- takeScreenshot: 11_search_results

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"

# Clear search
- tapOn:
    id: "btn-clear-search"
    optional: true
- takeScreenshot: 11_search_cleared
