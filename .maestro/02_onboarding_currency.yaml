appId: com.goalin.subradar
name: "02 - Onboarding Currency Selection (v1.4.0)"
---
# Clean start — tests onboarding itself (6-slide v1.4.0 layout)
- clearState
- launchApp
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "btn-get-started"
    timeout: 30000

# Step 0: Showcase
- tapOn:
    id: "btn-get-started"

# Step 1: Language
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-language"
    timeout: 10000
- tapOn:
    id: "lang-en"
    optional: true
- tapOn:
    id: "btn-next"

# Step 2: Currency (step-welcome + step-features removed in v1.4.0)
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-currency"
    timeout: 10000
- takeScreenshot: 02_currency_screen

# Pick EUR then switch back to USD — verifies toggle behavior
- tapOn:
    text: "EUR"
    optional: true
- takeScreenshot: 02_currency_eur
- tapOn:
    text: "USD"
    optional: true
- takeScreenshot: 02_currency_usd

# Advance to step 3 (auth)
- tapOn:
    id: "btn-next"
- runFlow: ./_dismiss_logbox.yaml
- extendedWaitUntil:
    visible:
      id: "step-auth"
    timeout: 10000
- takeScreenshot: 02_after_currency

# Sanity
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
