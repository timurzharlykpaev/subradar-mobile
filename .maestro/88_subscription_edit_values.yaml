appId: com.goalin.subradar
name: "88 - Edit subscription: change amount, save, verify (v1.4.0)"
#
# Adds a sub, opens it, opens Edit sheet, changes the amount, saves.
# Verifies the new amount persists and detail screen reflects it.
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

# Add a throwaway subscription
- tapOn:
    id: "tab-add"
- extendedWaitUntil:
    visible:
      id: "add-sub-sheet"
    timeout: 10000
- tapOn:
    id: "btn-manual-toggle"
- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 10000
- tapOn:
    id: "name-input"
- inputText: "QA Edit"
- tapOn:
    id: "amount-input"
- inputText: "5.99"
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard
- tapOn:
    id: "btn-save-sub"
- extendedWaitUntil:
    notVisible:
      id: "add-sub-sheet"
    timeout: 15000

- runFlow: ./_dismiss_modals.yaml

# Open from Subs tab
- tapOn:
    id: "tab-subs"
- extendedWaitUntil:
    visible:
      id: "subscriptions-screen"
    timeout: 10000
- tapOn: "QA Edit"
- extendedWaitUntil:
    visible:
      id: "subscription-detail-screen"
    timeout: 10000

# Open Edit sheet, change amount
- tapOn:
    id: "btn-edit-sub"
- extendedWaitUntil:
    visible:
      id: "edit-sub-sheet"
    timeout: 10000

# Change amount — via inputText replacement (backspace+type)
- tapOn:
    id: "amount-input"
    optional: true
- eraseText:
    charactersToErase: 10
- inputText: "19.99"
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard
- tapOn:
    id: "btn-save-edit"

- extendedWaitUntil:
    notVisible:
      id: "edit-sub-sheet"
    timeout: 10000

# Detail should refresh with new amount
- takeScreenshot: 88_edit_saved

- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
