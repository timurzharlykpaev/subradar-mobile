appId: com.goalin.subradar
name: "04g - Add Sub New Fields"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription via + tab
- tapOn:
    text: "+"
    optional: true
- tapOn:
    id: "tab-manual"
    optional: true

# Fill required fields
- tapOn:
    id: "name-input"
    optional: true
- inputText: "Test Service"
- tapOn:
    id: "amount-input"
    optional: true
- inputText: "9.99"

# Expand "More options"
- tapOn:
    text: "More options"
    optional: true

- takeScreenshot: 04g_new_fields

# Sanity
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
