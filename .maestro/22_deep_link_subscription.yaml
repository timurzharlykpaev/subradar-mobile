appId: com.goalin.subradar
name: "22 - Subscription Detail Navigation"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Subscriptions tab
- tapOn:
    text: "Subscriptions"
    optional: true

# Verify subscriptions screen loaded
- assertVisible:
    id: "subscriptions-screen"
    optional: true
- takeScreenshot: 22_subscriptions_list

# Verify subscription list is present
- assertVisible:
    id: "subscription-list"
    optional: true

# Tap first subscription to open detail
- tapOn:
    id: "subscription-list"
    optional: true
    index: 0
- takeScreenshot: 22_subscription_detail

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"
