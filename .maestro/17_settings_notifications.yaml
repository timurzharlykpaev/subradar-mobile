appId: com.goalin.subradar
name: "17 - Settings Notifications"
---

- runFlow: ./00_setup_auth.yaml

# Открываем Settings
- tapOn:
    text: "Settings"
    optional: true

- waitForAnimationToEnd

# Проверяем что Settings загрузился
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"

# Прокручиваем до уведомлений
- scroll

- assertNotVisible: "Error"
