appId: com.goalin.subradar
name: "17 - Settings Notifications"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Settings tab
- tapOn:
    text: "Settings"
    optional: true

# Verify settings screen loaded
- assertVisible:
    id: "settings-screen"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: 17_settings_screen

# Scroll to notifications section
- scrollUntilVisible:
    element:
      id: "btn-notifications-toggle"
    direction: DOWN
    timeout: 5000
    optional: true

# Toggle notifications
- tapOn:
    id: "btn-notifications-toggle"
    optional: true
- takeScreenshot: 17_notifications_toggled

# Check reminder buttons
- assertVisible:
    id: "btn-reminder-1d"
    optional: true
- takeScreenshot: 17_reminder_options

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"
