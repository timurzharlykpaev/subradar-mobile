appId: com.goalin.subradar
name: "152 - Analytics: populated screen + stats + charts (HARD)"
#
# Adds one subscription, then opens the Analytics tab and HARD-asserts the
# screen, the summary strip and the monthly + category charts render with
# no NaN/undefined/Invalid Date. Analytics re-fetches on tab focus, so the
# add is reflected without a manual refresh.
---
- runFlow: ./00_setup_auth.yaml

- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 25000

# ── Add a subscription so analytics leaves its empty state ──
- tapOn:
    id: "tab-add"
- extendedWaitUntil:
    visible:
      id: "add-sub-sheet"
    timeout: 10000
- tapOn:
    id: "hero-manual"
- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 10000
- tapOn:
    id: "name-input"
- inputText: "QA Analytics Spotify"
- tapOn:
    id: "amount-input"
- inputText: "11.99"
- tapOn:
    text: "Done"
    optional: true
- hideKeyboard
- tapOn:
    id: "btn-save-sub"
- extendedWaitUntil:
    notVisible:
      id: "add-sub-sheet"
    timeout: 15000
- runFlow: ./_dismiss_modals.yaml

# ── Open Analytics tab ──
- tapOn:
    id: "tab-analytics"
- extendedWaitUntil:
    visible:
      id: "analytics-screen"
    timeout: 20000

# ── HARD asserts: summary strip + charts ──
- assertVisible:
    id: "analytics-stats-row"
- assertVisible:
    id: "analytics-monthly-chart"
- assertVisible:
    id: "analytics-category-chart"

# ── No render garbage ──
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "Invalid Date"
- assertNotVisible: "null"
- assertNotVisible: "Render Error"
- takeScreenshot: 152_analytics_populated
