appId: com.goalin.subradar
name: "04b - Add Subscription AI"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# Switch to AI tab
- tapOn:
    id: "tab-ai"
    optional: true
- takeScreenshot: 04b_ai_tab

# Verify AI wizard is visible
- assertVisible:
    id: "ai-wizard"
    optional: true

# Verify AI input is available
- assertVisible:
    id: "ai-wizard-input"
    optional: true
- takeScreenshot: 04b_ai_wizard

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
