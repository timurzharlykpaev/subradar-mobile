appId: com.goalin.subradar
name: "04b - Add Subscription AI (Direct Save)"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "add-sub-sheet"
    optional: true
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# AI tab should be default (tab 0)
- assertVisible:
    id: "ai-wizard"
    optional: true
- takeScreenshot: 04b_ai_wizard_idle

# Type subscription name
- tapOn:
    id: "ai-wizard-input"
    optional: true
- inputText: "Netflix"
- takeScreenshot: 04b_ai_input_filled

# Verify sanity
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
