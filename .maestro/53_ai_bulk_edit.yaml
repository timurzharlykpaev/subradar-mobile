appId: com.goalin.subradar
name: "53 - AI Wizard: bulk add + edit individual subscription"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription sheet
- tapOn:
    id: "dashboard-quick-actions"
    optional: true

# AI tab
- extendedWaitUntil:
    visible:
        id: "ai-wizard"
    timeout: 5000

# Type multiple subscriptions
- tapOn:
    id: "ai-wizard-input"
- inputText: "Netflix, Spotify, iCloud"

# Submit
- tapOn:
    text: "Далее →"
    optional: true
- tapOn:
    text: "Next →"
    optional: true

# Wait for bulk results
- extendedWaitUntil:
    notVisible:
        text: "Searching"
    timeout: 30000
    optional: true
- extendedWaitUntil:
    notVisible:
        text: "Ищу"
    timeout: 30000
    optional: true
- takeScreenshot: 53_bulk_list

# Verify bulk list appeared (should have multiple items)
- assertVisible:
    text: "Netflix"
    optional: true
- assertVisible:
    text: "Spotify"
    optional: true

# Tap Edit on first item
- tapOn:
    text: "Edit"
    optional: true
- tapOn:
    text: "Редактировать"
    optional: true
- takeScreenshot: 53_bulk_edit_form

# Verify edit form has fields
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"

# Go back to list
- tapOn:
    text: "Done"
    optional: true
- tapOn:
    text: "Готово"
    optional: true
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Назад"
    optional: true
- takeScreenshot: 53_back_to_bulk_list

# Verify Delete button works — remove one item
- tapOn:
    text: "Delete"
    optional: true
- tapOn:
    text: "Удалить"
    optional: true
- takeScreenshot: 53_after_delete

# Sanity
- assertNotVisible: "Render Error"
