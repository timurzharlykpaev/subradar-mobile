appId: com.goalin.subradar
name: "37 - Dashboard Navigation"
---
- runFlow: ./00_setup_auth.yaml

# Dashboard loaded — check content
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"

# Check for subscription data visible
- assertVisible:
    text: "Total this month"
    optional: true

# Navigate to "See All" subscriptions
- tapOn:
    text: "All"
    optional: true

# Sanity check
- assertNotVisible: "NaN"
- assertNotVisible: "undefined"
- assertNotVisible: "Render Error"
- takeScreenshot: 37_dashboard_done
