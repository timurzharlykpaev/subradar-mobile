appId: com.goalin.subradar
name: "07 - Settings Theme Toggle"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Settings tab
- tapOn:
    text: "Settings"
    optional: true

# Verify settings screen loaded
- assertVisible:
    id: "settings-screen"
    optional: true
- takeScreenshot: 07_settings_before_toggle

# Toggle theme
- tapOn:
    id: "btn-theme-toggle"
    optional: true
- takeScreenshot: 07_settings_after_toggle

# Toggle back
- tapOn:
    id: "btn-theme-toggle"
    optional: true
- takeScreenshot: 07_settings_theme_restored

# Render sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
