appId: com.goalin.subradar
name: "22 - Subscription Detail - No undefined/null"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to Subscriptions tab
- tapOn:
    text: "Subs"
    optional: true

# Verify subscriptions screen loaded
- assertVisible:
    id: "subscriptions-screen"
    optional: true

# Verify subscription list
- assertVisible:
    id: "subscription-list"
    optional: true
- takeScreenshot: 22n_subscriptions_list

# Tap first subscription to open detail
- tapOn:
    id: "subscription-list"
    optional: true
    index: 0
- takeScreenshot: 22n_subscription_detail

# Verify no broken data on detail screen
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
- assertNotVisible: "Invalid Date"

# Verify key fields are present
- assertVisible:
    text: "USD"
    optional: true
- takeScreenshot: 22n_detail_verified
