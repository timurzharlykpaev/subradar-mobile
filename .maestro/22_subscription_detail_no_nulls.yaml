appId: com.goalin.subradar
name: "Subscription Detail - No undefined/null"
---

# Авторизация через demo аккаунт
- runFlow: ./00_setup_auth.yaml

- tapOn:
    text: "Subs, tab"
    optional: true
- tapOn:
    text: "Subs"
    optional: true
- assertVisible:
    text: "Подписки"
    optional: true
- tapOn:
    index: 0
    optional: true
# Verify no broken data on detail screen
- assertNotVisible: "undefined"
- assertNotVisible: "null"
- assertNotVisible: "NaN"
- assertNotVisible: "Ошибка"
- assertNotVisible: "Invalid Date"
# Verify key fields are present
- assertVisible:
    text: "USD"
    optional: true
- assertVisible:
    text: "MONTHLY"
    optional: true
