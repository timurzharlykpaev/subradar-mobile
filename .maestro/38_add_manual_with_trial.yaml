appId: com.goalin.subradar
name: "38 - Add Subscription: Manual with Trial Period"
---
- runFlow: ./00_setup_auth.yaml

# Open add subscription
- tapOn: "Subs"
- tapOn:
    text: "+"
    optional: true

# Switch to manual tab
- tapOn:
    id: "tab-manual"
    optional: true
- tapOn:
    text: "Manual"
    optional: true

# Fill name
- tapOn:
    id: "name-input"
    optional: true
- inputText: "Test Trial Sub"

# Fill amount
- tapOn:
    id: "amount-input"
    optional: true
- inputText: "9.99"

# Expand more options
- scroll
- assertVisible:
    text: "More"
    optional: true

- tapOn:
    text: "More"
    optional: true

# Toggle trial period
- scroll
- assertVisible:
    text: "Trial"
    optional: true

- tapOn:
    text: "Trial"
    optional: true

# Save
- scroll
- assertVisible:
    text: "Save"
    optional: true- tapOn:
    text: "Save"
    optional: true
- tapOn:
    id: "btn-save-sub"
    optional: true

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
