appId: com.goalin.subradar
name: "34 - Reports: Generate Report"
---
- runFlow: ./00_setup_auth.yaml

# Navigate to reports (via settings or direct)
- tapOn: "Settings"

- scrollUntilVisible:
    element:
      text: "Report"
    direction: DOWN
    timeout: 5000

- tapOn:
    text: "Report"
    optional: true

# Select report type
- tapOn:
    text: "Summary"
    optional: true

# Select date range
- tapOn:
    text: "Month"
    optional: true

# Generate
- tapOn:
    text: "Generate"
    optional: true

# Wait for generation
- extendedWaitUntil:
    visible:
      text: "Report"
    timeout: 15000
  optional: true

# Sanity checks
- assertNotVisible: "undefined"
- assertNotVisible: "NaN"
- assertNotVisible: "Render Error"
