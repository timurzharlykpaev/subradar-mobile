name: Build Mobile

on:
  push:
    branches: [demo, release]
  workflow_dispatch:
    inputs:
      branch_type:
        description: 'Build type'
        required: true
        default: 'demo'
        type: choice
        options: [demo, release]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set profile
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          INPUT="${{ github.event.inputs.branch_type }}"
          TARGET="${BRANCH:-$INPUT}"
          if [ "$TARGET" = "release" ]; then
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "profile=preview" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: npx eas build --platform all --profile ${{ steps.env.outputs.profile }} --non-interactive --no-wait
