name: Build Dev → TestFlight Internal + Play Internal

on:
  push:
    branches: [demo]
  workflow_dispatch:

jobs:
  build-and-submit-ios:
    name: iOS → TestFlight (Internal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (preview)
        run: npx eas build --platform ios --profile preview --non-interactive --no-wait

  build-and-submit-android:
    name: Android → Play Internal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (preview)
        run: npx eas build --platform android --profile preview --non-interactive --no-wait
